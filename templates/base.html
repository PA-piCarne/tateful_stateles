<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}App Demo{% endblock %}</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        background: #f4f4f4;
      }

      .card {
        width: min(90vw, 420px);
        background: white;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      form p {
        text-align: left;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        margin-top: 4px;
      }

      button,
      .btn-link {
        margin-top: 12px;
        display: inline-block;
        border: none;
        background: #1f6feb;
        color: white;
        padding: 10px 14px;
        border-radius: 8px;
        text-decoration: none;
        cursor: pointer;
      }

      .small {
        margin-top: 14px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">{% block content %}{% endblock %}</div>
  </body>
</html>
